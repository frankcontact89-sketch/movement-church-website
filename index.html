<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Movement Church USA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #071f36, #0b3458);
      color: white;
      text-align: center;
    }
    header {
      padding: 28px 20px;
    }
    .logo {
      width: 180px;
      max-width: 80%;
    }
    .hero {
      min-height: 75vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px 22px;
    }
    .badge {
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(42px, 10vw, 92px);
      line-height: 1;
      margin: 0;
    }
    p {
      max-width: 720px;
      font-size: 18px;
      line-height: 1.7;
      color: rgba(255,255,255,.82);
    }
    .buttons {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      color: white;
      text-decoration: none;
    }
    .btn {
      padding: 15px 24px;
      border-radius: 999px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,.35);
    }
    .btn.primary {
      background: #35bfff;
      color: #061b2e;
      border: none;
    }
    footer {
      padding: 30px 20px;
      color: rgba(255,255,255,.6);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.jpg" alt="Movement Church Logo" class="logo" />
  </header>

  <main class="hero">
    <div class="badge">WELCOME HOME</div>
    <h1>Global Movement<br>Church USA</h1>
    <p>
      A global online church family centered on Jesus Christ, prayer,
      discipleship, worship, and the expansion of God’s Kingdom among the nations.
    </p>
    <div class="buttons">
      <a class="btn primary" href="#">Join Online</a>
      <a class="btn" href="#">Watch Live</a>
    </div>
  </main>

  <footer>
    © 2026 Global Movement Church USA. All rights reserved.
  </footer>
</body>
</html>
